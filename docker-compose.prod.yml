services:
  mongodb-auth:
    image: mongo:4.4
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    volumes:
      - mongo-auth-data:/data/db
    networks:
      - backend

  mongodb-product:
    image: mongo:4.4
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    volumes:
      - mongo-product-data:/data/db
    networks:
      - backend

  mongodb-order:
    image: mongo:4.4
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    volumes:
      - mongo-order-data:/data/db
    networks:
      - backend

  auth-service:
    image: ${CI_REGISTRY_IMAGE}/auth-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb-auth:27017/auth?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    depends_on:
      - mongodb-auth
    networks:
      - backend

  product-service:
    image: ${CI_REGISTRY_IMAGE}/product-service:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb-product:27017/ecommerce?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    depends_on:
      - mongodb-product
    networks:
      - backend

  order-service:
    image: ${CI_REGISTRY_IMAGE}/order-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb-order:27017/orders?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      VITE_PRODUCT_SERVICE_URL: http://product-service:3000
    depends_on:
      - mongodb-order
      - product-service
    networks:
      - backend

  init-products:
    image: curlimages/curl:8.11.1
    restart: "no"
    depends_on:
      - product-service
    environment:
      API_URL: http://product-service:3000/api
      TOKEN: ${PRODUCT_SEED_TOKEN:-efrei_super_pass}
    volumes:
      - ./scripts/init-products.sh:/scripts/init-products.sh:ro
    command: ["sh", "/scripts/init-products.sh"]
    networks:
      - backend

  frontend:
    image: ${CI_REGISTRY_IMAGE}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      VITE_AUTH_SERVICE_URL: http://auth-service:3001
      VITE_PRODUCT_SERVICE_URL: http://product-service:3000
      VITE_ORDER_SERVICE_URL: http://order-service:3002
    depends_on:
      - auth-service
      - product-service
      - order-service
      - init-products
    networks:
      - backend

volumes:
  mongo-auth-data:
  mongo-product-data:
  mongo-order-data:

networks:
  backend:
    driver: bridge
