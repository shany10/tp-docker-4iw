services:
  mongodb-auth:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo-auth-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password

  mongodb-product:
    image: mongo:4.4
    ports:
      - "27018:27017"
    volumes:
      - mongo-product-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password

  mongodb-order:
    image: mongo:4.4
    ports:
      - "27019:27017"
    volumes:
      - mongo-order-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb-auth:27017/auth?authSource=admin
      - JWT_SECRET=test_secret

    depends_on:
      - mongodb-auth

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb-order:27017/orders?authSource=admin
      - JWT_SECRET=test_secret

    depends_on:
      - mongodb-order

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb-product:27017/ecommerce?authSource=admin
      - JWT_SECRET=test_secret

    depends_on:
      - mongodb-product

  init-products:
    image: curlimages/curl:8.11.1
    restart: "no"
    depends_on:
      - product-service
    environment:
      - API_URL=http://product-service:3000/api
      - TOKEN=test_secret
    volumes:
      - ./scripts/init-products.sh:/scripts/init-products.sh:ro
    command: ["sh", "/scripts/init-products.sh"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - order-service
      - product-service
      - init-products

volumes:
  mongo-auth-data:
  mongo-product-data:
  mongo-order-data:
